<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}فروشگاه وودن{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Vazirmatn Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'walnut': {
                            '50': '#fdf8f6',
                            '100': '#f2e8e5',
                            '200': '#eaddd7',
                            '300': '#e0cec7',
                            '400': '#d2bab0',
                            '500': '#bfa094',
                            '600': '#a18072',
                            '700': '#977669',
                            '800': '#846358',
                            '900': '#5C3A21', // Main Accent
                            '950': '#4d2f1a',
                        },
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- Header -->
    <header class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-lg shadow-sm">
        <nav class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between">
                <div class="flex items-center">
                    <a href="{% url 'shop:product_list' %}" class="text-2xl font-bold text-walnut-900">
                        وودن شاپ
                    </a>
                </div>
                <div class="flex items-center">
                    <a href="{% url 'orders:cart_detail' %}" class="rounded-md bg-walnut-900 px-4 py-2 text-sm font-medium text-white hover:bg-walnut-800 transition-colors">
                        سبد خرید
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200">
        <div class="container mx-auto py-6 px-4 sm:px-6 lg:px-8 text-center text-slate-500">
            <p>&copy; {% now "Y" %} فروشگاه وودن. تمام حقوق محفوظ است.</p>
        </div>
    </footer>

</body>
</html>
