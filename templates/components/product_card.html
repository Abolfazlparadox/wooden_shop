{% load humanize %}
<div class="group relative bg-white dark:bg-slate-800 rounded-lg overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 ease-in-out transform hover:-translate-y-1">
    <a href="{{ product.get_absolute_url }}" class="block">
        <div class="aspect-square w-full overflow-hidden">
            {% if product.images.first %}
                <img class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" src="{{ product.images.first.image.url }}" alt="{{ product.title }}">
            {% else %}
                <div class="w-full h-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center">
                    <span class="text-slate-400">بدون تصویر</span>
                </div>
            {% endif %}
        </div>
        <div class="p-5 text-right">
            <h3 class="text-lg font-semibold text-slate-800 dark:text-white truncate">{{ product.title }}</h3>
            {% if product.variations.first %}
                <p class="text-walnut-800 dark:text-walnut-300 font-bold mt-2">{{ product.variations.first.price|intcomma }} تومان</p>
            {% endif %}
        </div>
    </a>
    <div class="p-5 pt-0">
        <form action="{% url 'orders:cart_add' product.variations.first.id %}" method="post">
            {% csrf_token %}
            <button type="submit" class="w-full text-center bg-walnut-900 text-white py-2 px-4 rounded-md hover:bg-walnut-800 transition-colors dark:bg-walnut-800 dark:hover:bg-walnut-700">
                افزودن به سبد خرید
            </button>
        </form>
    </div>
</div>
