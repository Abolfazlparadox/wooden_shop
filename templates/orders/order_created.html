{% extends 'base.html' %}

{% block title %}سفارش شما ثبت شد{% endblock %}

{% block content %}
<div class="text-center bg-white rounded-lg shadow-md p-12">
    <svg class="mx-auto h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <h1 class="mt-4 text-2xl font-bold text-slate-900">سفارش شما با موفقیت ثبت شد!</h1>
    <p class="mt-2 text-slate-600">از خرید شما متشکریم. شماره سفارش شما <strong class="text-walnut-900">#{{ order.id }}</strong> است.</p>
    <p class="mt-1 text-slate-500">به زودی جهت هماهنگی ارسال با شما تماس خواهیم گرفت.</p>
    <div class="mt-6">
        <a href="{% url 'shop:product_list' %}" class="inline-block bg-walnut-900 text-white py-2 px-5 rounded-md hover:bg-walnut-800 transition-colors">
            بازگشت به فروشگاه
        </a>
    </div>
</div>
{% endblock %}
