<h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-6">اطلاعات حساب</h1>
<form action="{% url 'accounts:dashboard' %}" method="post">
    {% csrf_token %}
    <input type="hidden" name="update_profile" value="1">
    <div class="space-y-4 max-w-lg">
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">شماره تلفن (غیرقابل تغییر)</label>
            <input type="text" value="{{ user.phone_number }}" disabled class="mt-1 block w-full rounded-md border-gray-300 bg-gray-100 dark:bg-slate-700 dark:border-slate-600">
        </div>
        <div>
            <label for="{{ profile_form.first_name.id_for_label }}" class="block text-sm font-medium text-slate-700 dark:text-slate-300">{{ profile_form.first_name.label }}</label>
            {{ profile_form.first_name }}
        </div>
        <div>
            <label for="{{ profile_form.last_name.id_for_label }}" class="block text-sm font-medium text-slate-700 dark:text-slate-300">{{ profile_form.last_name.label }}</label>
            {{ profile_form.last_name }}
        </div>
        <button type="submit" class="bg-walnut-900 text-white font-bold py-2 px-6 rounded-lg hover:bg-walnut-800">ذخیره تغییرات</button>
    </div>
</form>
