{% extends 'base.html' %}

{% block title %}تایید کد ارسالی{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-lg">
            <div class="text-center">
                <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">
                    تایید کد ارسالی
                </h2>
                <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                    کد ۶ رقمی ارسال شده به شماره شما را وارد کنید.
                </p>
            </div>

            <form class="mt-8 space-y-6" action="" method="POST">
                {% csrf_token %}
                <div class="space-y-4 rounded-md">
                    {{ form.as_p }}
                </div>

                <div>
                    <button type="submit" class="group relative flex w-full justify-center rounded-md border border-transparent bg-walnut-900 py-3 px-4 text-lg font-semibold text-white hover:bg-walnut-800 focus:outline-none focus:ring-2 focus:ring-walnut-700 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-colors">
                        تایید و ادامه
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
